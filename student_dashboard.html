<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | CMCS VLS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; padding: 0; overflow-x: hidden; }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .sidebar { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .active-nav { background: white !important; color: black !important; font-weight: 800; border-radius: 12px !important; }

        /* Subject Card Styling */
        .subject-card { position: relative; overflow: hidden; border-radius: 1.25rem; height: 160px; transition: transform 0.2s ease; }
        .subject-card-bg { position: absolute; right: -10%; bottom: -10%; width: 120px; opacity: 0.25; pointer-events: none; }

        /* Full Screen Mobile View */
        #mobileSubjectFullScreen { position: fixed; inset: 0; z-index: 100; background: #050505; display: none; flex-direction: column; }
        #mobileSubjectFullScreen.open { display: flex; }

        /* STRICT PRINT LOGIC - Reverted to Original Clean Paper Layout */
        @media print {
            @page { margin: 1.5cm; size: portrait; }
            html, body { background: white !important; color: black !important; height: auto !important; overflow: visible !important; }
            
            /* Hide every UI element */
            header, aside, .no-print, .mobile-only, button, #mobileSubjectFullScreen, .sidebar, #infoSummary, #mobileSubjectGrid, #mobileExportActions { display: none !important; }
            
            /* Clean Print Container */
            #printAreaWrapper { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
            #printArea { display: block !important; width: 100%; }
            
            /* High Contrast Header */
            #printHeader { display: flex !important; flex-direction: column; align-items: center; border-bottom: 2pt solid black; margin-bottom: 20px; padding-bottom: 10px; }
            #printHeader img { width: 80px !important; filter: grayscale(1) contrast(1.5); }
            
            /* Squared Tables */
            .glass-card { border: none !important; background: transparent !important; backdrop-filter: none !important; }
            table { width: 100% !important; border-collapse: collapse !important; margin-top: 10px; border: 1.5pt solid black !important; }
            th { background: #f0f0f0 !important; color: black !important; border: 1pt solid black !important; padding: 10px !important; font-size: 11px !important; text-transform: uppercase; }
            td { border: 1pt solid black !important; padding: 8px 12px !important; color: black !important; font-size: 10px !important; background: white !important; }
            
            .print-watermark { display: flex !important; position: fixed !important; inset: 0 !important; justify-content: center !important; align-items: center !important; opacity: 0.08 !important; z-index: -1; }
            .print-watermark img { width: 70%; }
        }

        @media (max-width: 768px) { .desktop-only { display: none !important; } }
    </style>
</head>

<body class="h-screen flex flex-col md:flex-row overflow-hidden">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-[90] w-72 sidebar transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col no-print md:relative shrink-0">
        <div class="h-20 hidden md:flex items-center px-8 border-b border-white/5">
            <div class="flex items-center gap-3">
                <img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png" class="h-8">
                <span class="font-black text-lg tracking-tighter uppercase">CMCS <span class="text-gray-500">VLS</span></span>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 space-y-6 overflow-y-auto">
            <div>
                <p class="px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Core Portal</p>
                <a onclick="switchGlobalView('schedules')" id="navSched" class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold mb-2 cursor-pointer hover:bg-white/5 text-gray-400">
                    <i class="fa-solid fa-calendar-day text-xs"></i> <span class="uppercase">Schedules</span>
                </a>
                <a onclick="switchGlobalView('grades')" id="navGrades" class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold mb-2 cursor-pointer hover:bg-white/5 text-gray-400">
                    <i class="fa-solid fa-file-invoice text-xs"></i> <span class="uppercase">Records</span>
                </a>
            </div>
            <div class="desktop-only">
                <p class="px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Enrolled Subjects</p>
                <div id="subjectNavItems" class="space-y-2"></div>
            </div>
        </nav>
    </aside>

    <div id="printAreaWrapper" class="flex-1 flex flex-col h-full overflow-hidden">
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            <header class="h-auto py-8 hidden md:flex items-center justify-between px-10 border-b border-white/5 no-print shrink-0">
                <div class="flex flex-col">
                    <h1 id="headerTitle" class="text-sm font-black uppercase tracking-[0.2em] text-white">Dashboard</h1>
                    <div id="headerContext" class="flex flex-wrap items-center gap-2 mt-3"></div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="subjectToggles" class="hidden glass-card !rounded-xl p-1">
                        <button id="btnAtt" onclick="switchSubTab('attendance')" class="px-5 py-2.5 text-[10px] font-black uppercase rounded-lg active-nav">Attendance</button>
                        <button id="btnMat" onclick="switchSubTab('materials')" class="px-5 py-2.5 text-[10px] font-black uppercase rounded-lg text-gray-500">Materials</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportCSV()" class="px-5 py-2.5 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase">CSV</button>
                        <button onclick="exportPDF()" class="px-5 py-2.5 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase">PDF</button>
                    </div>
                </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-10">
                <div id="workspace" class="max-w-7xl mx-auto space-y-6">
                    <div id="infoSummary" class="grid grid-cols-2 lg:grid-cols-4 gap-4 no-print"></div>

                    <div id="mobileSubjectGrid" class="md:hidden grid grid-cols-1 gap-4"></div>

                    <div id="printArea">
                        <div class="print-watermark hidden"><img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png"></div>
                        
                        <div id="printHeader" class="hidden">
                            <img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png">
                            <h2 class="text-xl font-black uppercase mt-2">Central Mindanao Computer School</h2>
                            <p class="text-[9px] uppercase font-bold">Official Student Academic Report</p>
                            <div class="grid grid-cols-2 gap-x-12 mt-6 text-left w-full border-t border-black pt-4">
                                <div class="text-[10pt]"><p><b>STUDENT:</b> <span id="pName"></span></p><p><b>ID:</b> <span id="pID"></span></p></div>
                                <div class="text-[10pt]"><p><b>COURSE:</b> <span id="pCourse"></span></p><p><b>DATE:</b> <span id="pGenDate"></span></p></div>
                            </div>
                        </div>

                        <div id="tableCard" class="glass-card overflow-hidden">
                            <table class="w-full text-left border-collapse" id="mainTable">
                                <thead id="tableHead" class="bg-white/5 text-[10px] uppercase font-black text-gray-400"></thead>
                                <tbody id="tableBody" class="divide-y divide-white/5 text-sm"></tbody>
                            </table>
                        </div>
                    </div>

                    <div id="mobileExportActions" class="md:hidden flex gap-3 pb-24 hidden">
                        <button onclick="exportCSV()" class="flex-1 py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase">Export CSV</button>
                        <button onclick="exportPDF()" class="flex-1 py-4 bg-red-500/10 border border-red-500/20 text-red-500 rounded-2xl text-[10px] font-black uppercase">Print PDF</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="mobileSubjectFullScreen" class="no-print">
        <div class="h-16 flex items-center px-6 border-b border-white/5">
            <button onclick="closeMobPanel()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="ml-4 flex-1 truncate">
                <h3 id="mobPanelTitle" class="text-sm font-black uppercase truncate">Subject Name</h3>
                <p id="mobPanelTeacher" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest"></p>
            </div>
        </div>
        <div class="p-4 flex gap-2">
            <button id="mobTabAtt" onclick="switchMobTab('attendance')" class="flex-1 py-3 rounded-xl bg-white text-black text-[10px] font-black uppercase">Attendance</button>
            <button id="mobTabMat" onclick="switchMobTab('materials')" class="flex-1 py-3 rounded-xl bg-white/5 text-gray-500 text-[10px] font-black uppercase">Materials</button>
        </div>
        <div id="mobPanelContent" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-white/10 flex justify-around items-center h-20 px-4 z-[80] no-print">
        <button onclick="switchGlobalView('subjects')" class="flex flex-col items-center gap-1 text-white">
            <i class="fa-solid fa-book-open"></i><span class="text-[9px] font-bold uppercase">Subjects</span>
        </button>
        <button onclick="switchGlobalView('schedules')" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-calendar"></i><span class="text-[9px] font-bold uppercase">Schedules</span>
        </button>
        <button onclick="switchGlobalView('grades')" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-file-invoice"></i><span class="text-[9px] font-bold uppercase">Records</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ", authDomain: "svls-289ee.firebaseapp.com", projectId: "svls-289ee", storageBucket: "svls-289ee.firebasestorage.app", messagingSenderId: "500705386198", appId: "1:500705386198:web:96f189662bc2aa99cf7377" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        
        let currentStudent = null, programs = [], activeSubj = null, currentMode = 'subjects';

        const cardColors = [
            { bg: 'bg-rose-500/20', accent: 'text-rose-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135783.png' },
            { bg: 'bg-emerald-500/20', accent: 'text-emerald-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135768.png' },
            { bg: 'bg-blue-500/20', accent: 'text-blue-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png' },
            { bg: 'bg-amber-500/20', accent: 'text-amber-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135755.png' }
        ];

        // Format 24h to 12h AM/PM
        function t12(t) { if (!t) return ""; let [h, m] = t.split(':'); h = parseInt(h); const p = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${m} ${p}`; }

        onAuthStateChanged(auth, async user => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    currentStudent = { uid: user.uid, ...snap.data() };
                    initUI(); await fetchSubjects();
                    switchGlobalView(window.innerWidth <= 768 ? 'subjects' : 'schedules');
                }
            }
        });

        function initUI() {
            document.getElementById('infoSummary').innerHTML = `
                <div class="glass-card p-5"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">PROGRAM</p><p class="text-xs font-black uppercase truncate">${currentStudent.course}</p></div>
                <div class="glass-card p-5"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">YEAR/SEM</p><p class="text-xs font-black uppercase">Y${currentStudent.year} - ${currentStudent.semester}</p></div>
                <div class="glass-card p-5 hidden md:block"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">STATUS</p><p class="text-xs font-black text-emerald-400 uppercase">ENROLLED</p></div>
                <div class="glass-card p-5 hidden md:block"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">SCHOOL YEAR</p><p class="text-xs font-black text-blue-400 uppercase">2025-2026</p></div>`;
        }

        async function fetchSubjects() {
            const codes = currentStudent.assignedPrograms || [];
            if (!codes.length) return;
            const q = query(collection(db, "programs"), where("code", "in", codes));
            const snap = await getDocs(q); programs = snap.docs.map(d => d.data());
            
            const nav = document.getElementById('subjectNavItems'); 
            const grid = document.getElementById('mobileSubjectGrid');
            nav.innerHTML = ''; grid.innerHTML = '';

            programs.forEach((p, i) => {
                const color = cardColors[i % cardColors.length];
                // Web Nav
                nav.innerHTML += `<a onclick="switchSubjectView('${p.code}')" class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-[11px] font-black uppercase mb-1 cursor-pointer hover:bg-white/5 text-gray-400"><i class="fa-solid fa-book-open text-xs"></i> ${p.code}</a>`;
                // Mobile Grid with AM/PM Time
                grid.innerHTML += `
                    <div onclick="openMobPanel('${p.code}')" class="subject-card ${color.bg} border border-white/5 p-5 flex flex-col justify-between">
                        <img src="${color.icon}" class="subject-card-bg">
                        <div><h4 class="text-base font-black uppercase text-white">${p.name}</h4><p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${p.code}</p></div>
                        <div class="flex items-center gap-4">
                            <div class="flex flex-col"><span class="text-[8px] font-bold text-gray-500 uppercase">Schedule</span><span class="text-[10px] font-black text-white uppercase">${p.schedule} (${t12(p.startTime)})</span></div>
                            <div class="flex flex-col"><span class="text-[8px] font-bold text-gray-500 uppercase">Instructor</span><span class="text-[10px] font-black ${color.accent} uppercase">${p.teacher}</span></div>
                        </div>
                    </div>`;
            });
        }

        window.switchGlobalView = (mode) => {
            currentMode = mode; activeSubj = null;
            document.getElementById('mobileSubjectGrid').classList.toggle('hidden', mode !== 'subjects');
            document.getElementById('tableCard').classList.toggle('hidden', mode === 'subjects');
            document.getElementById('mobileExportActions').classList.toggle('hidden', mode === 'subjects');
            document.getElementById('headerTitle').innerText = mode === 'schedules' ? "Class Schedules" : (mode === 'grades' ? "Scholastic Records" : "Enrolled Subjects");
            document.getElementById('subjectToggles').classList.add('hidden');
            if (mode !== 'subjects') renderTable();
        };

        window.switchSubjectView = (code) => {
            activeSubj = programs.find(p => p.code === code);
            currentMode = 'attendance';
            document.getElementById('headerTitle').innerText = activeSubj.name;
            document.getElementById('headerContext').innerHTML = `<span class="bg-blue-600 text-white px-3 py-1 text-[10px] font-black uppercase">${activeSubj.schedule}</span>`;
            document.getElementById('subjectToggles').classList.remove('hidden');
            document.getElementById('tableCard').classList.remove('hidden');
            renderTable();
        };

        async function renderTable() {
            const head = document.getElementById('tableHead'); const body = document.getElementById('tableBody'); body.innerHTML = '';
            if (currentMode === 'schedules') {
                head.innerHTML = `<tr><th class="px-8 py-5">Code</th><th class="px-8 py-5">Subject</th><th class="px-8 py-5">Time</th><th class="px-8 py-5">Instructor</th></tr>`;
                programs.forEach(p => { body.innerHTML += `<tr><td class="px-8 py-6 font-black">${p.code}</td><td class="px-8 py-6 uppercase font-bold">${p.name}</td><td class="px-8 py-6 font-bold">${p.schedule} <br><span class="text-[10px] text-gray-500">${t12(p.startTime)} - ${t12(p.endTime)}</span></td><td class="px-8 py-6 uppercase">${p.teacher}</td></tr>`; });
            } else if (currentMode === 'grades') {
                head.innerHTML = `<tr><th class="px-8 py-5">Subject</th><th class="px-8 py-5 text-center">PRE</th><th class="px-8 py-5 text-center">MID</th><th class="px-8 py-5 text-center">FIN</th><th class="px-8 py-5 text-right">GPA</th></tr>`;
                programs.forEach(p => { const g = currentStudent.grades?.[p.code] || { prelim: '-', midterm: '-', final: '-', point: '-' };
                    body.innerHTML += `<tr><td class="px-8 py-6 font-bold uppercase">${p.name}</td><td class="text-center font-black">${g.prelim}</td><td class="text-center font-black">${g.midterm}</td><td class="text-center font-black">${g.final}</td><td class="text-right px-8 font-black text-blue-400">${g.point}</td></tr>`; });
            }
        }

        window.openMobPanel = (code) => { activeSubj = programs.find(p => p.code === code); document.getElementById('mobPanelTitle').innerText = activeSubj.name; document.getElementById('mobPanelTeacher').innerText = activeSubj.teacher; document.getElementById('mobileSubjectFullScreen').classList.add('open'); switchMobTab('attendance'); };
        window.closeMobPanel = () => document.getElementById('mobileSubjectFullScreen').classList.remove('open');
        window.exportPDF = () => {
            document.getElementById('pName').innerText = `${currentStudent.lastname}, ${currentStudent.firstname}`;
            document.getElementById('pID').innerText = currentStudent.studentId;
            document.getElementById('pCourse').innerText = currentStudent.course;
            document.getElementById('pGenDate').innerText = new Date().toLocaleDateString();
            window.print();
        };
    </script>
</body>
</html>
