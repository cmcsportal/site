<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | CMCS VLS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
            display: block;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            border: 1px solid transparent;
            background-clip: content-box;
        }

        .logo-watermark {
            position: fixed;
            inset: 0;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.04;
            pointer-events: none;
        }

        .logo-watermark img {
            height: 75%;
            filter: grayscale(1) brightness(0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }

        .transparent-table-card {
            background: rgba(255, 255, 255, 0.01) !important;
            backdrop-filter: blur(8px);
        }

        .sidebar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-btn,
        .subj-btn {
            transition: all 0.3s ease;
            color: #94a3b8;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .active-nav {
            background: white !important;
            color: black !important;
            font-weight: 800;
            border-radius: 12px !important;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            min-width: 800px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .desktop-sidebar {
                display: none;
            }

            .mobile-header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 56px;
                background: rgba(5, 5, 5, 0.98);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 12px;
            }

            .mobile-menu-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(10px);
                z-index: 150;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }

            .mobile-menu-overlay.active {
                opacity: 1;
                pointer-events: auto;
            }

            .mobile-drawer {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                background: #0a0a0a;
                border-right: 1px solid rgba(255, 255, 255, 0.1);
                z-index: 160;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
            }

            .mobile-drawer.active {
                transform: translateX(0);
            }

            .subjects-grid {
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 12px;
                padding-top: 68px;
                padding-bottom: 20px;
                overflow-y: auto;
                height: 100vh;
            }

            .subject-card {
                position: relative;
                border-radius: 12px;
                padding: 16px;
                min-height: 120px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                cursor: pointer;
                border: 1px solid rgba(255, 255, 255, 0.1);
                flex-shrink: 0;
            }

            .mobile-fullscreen-view {
                position: fixed;
                inset: 0;
                background: #050505;
                z-index: 120;
                transform: translateY(100%);
                transition: transform 0.3s ease;
                display: flex;
                flex-direction: column;
            }

            .mobile-fullscreen-view.active {
                transform: translateY(0);
            }

            .mobile-view-header {
                background: rgba(255, 255, 255, 0.03);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 56px 16px 16px;
                position: relative;
            }

            .mobile-view-content {
                flex: 1;
                overflow-y: auto;
                padding: 12px;
                padding-bottom: 80px;
            }

            .mobile-tab-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(10, 10, 10, 0.98);
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                display: flex;
                justify-content: space-around;
                padding: 12px 0 24px;
                z-index: 130;
            }

            .mobile-tab-btn {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                color: #666;
                font-size: 11px;
                font-weight: 700;
                background: none;
                border: none;
                flex: 1;
            }

            .mobile-tab-btn.active {
                color: white;
            }
        }

        @media (min-width: 769px) {

            .mobile-only,
            .mobile-header,
            .mobile-menu-overlay,
            .mobile-drawer,
            .subjects-grid,
            .mobile-fullscreen-view,
            .mobile-export-bar,
            .mobile-tab-bar {
                display: none !important;
            }
        }

        @media print {
            @page {
                margin: 1cm;
                size: portrait;
            }

            html,
            body {
                background: white !important;
                color: black !important;
                overflow: visible !important;
            }

            body>*:not(#printAreaWrapper),
            .no-print {
                display: none !important;
            }

            #printAreaWrapper {
                display: block !important;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
            }

            #printHeader {
                display: flex !important;
                flex-direction: column !important;
            }

            .print-watermark {
                display: flex !important;
                opacity: 0.12 !important;
            }

            table {
                border: 1.5pt solid #000 !important;
                color: black !important;
                background: white !important;
            }

            th,
            td {
                border: 1pt solid #000 !important;
                color: black !important;
            }
        }
    </style>
</head>

<body class="h-screen flex flex-col md:flex-row overflow-hidden">
    <div class="logo-watermark no-print"><img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png">
    </div>

    <div class="mobile-header no-print">
        <button onclick="toggleMobileMenu()" class="text-white p-2 text-lg"><i
                class="fa-solid fa-bars-staggered"></i></button>
        <div class="font-black text-sm tracking-tighter uppercase">CMCS <span class="text-gray-500">VLS</span></div>
        <div class="w-9 h-9 rounded-full bg-white flex items-center justify-center text-xs font-bold text-black uppercase"
            id="mobileHeaderInitial">..</div>
    </div>

    <div class="mobile-menu-overlay no-print" id="mobileMenuOverlay" onclick="toggleMobileMenu()"></div>

    <div class="mobile-drawer no-print" id="mobileDrawer">
        <div class="p-5 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div id="mobileDrawerInitial"
                    class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-base font-bold text-black uppercase">
                    ..</div>
                <div>
                    <p class="text-sm font-black text-white uppercase" id="mobileDrawerName">Loading...</p>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-widest" id="mobileDrawerId">Student</p>
                </div>
            </div>
        </div>
        <nav class="p-3 space-y-1">
            <a onclick="openMobileSchedules(); toggleMobileMenu();"
                class="flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-semibold text-gray-300 hover:bg-white/5 cursor-pointer">
                <i class="fa-solid fa-calendar-day w-5"></i> <span class="uppercase font-bold">Schedules</span>
            </a>
            <a onclick="openMobileRecords(); toggleMobileMenu();"
                class="flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-semibold text-gray-300 hover:bg-white/5 cursor-pointer">
                <i class="fa-solid fa-file-invoice w-5"></i> <span class="uppercase font-bold">Records</span>
            </a>
            <button onclick="logout()"
                class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-semibold text-red-400 hover:bg-red-500/10 mt-3">
                <i class="fa-solid fa-right-from-bracket w-5"></i> <span class="uppercase font-bold">Sign Out</span>
            </button>
        </nav>
    </div>

    <div class="subjects-grid mobile-only no-print" id="mobileSubjectsView"></div>

    <div class="mobile-fullscreen-view no-print" id="mobileSchedulesView">
        <div class="mobile-view-header">
            <button class="mobile-back-btn" onclick="closeMobileFullscreen('mobileSchedulesView')"><i
                    class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-xl font-black text-white mb-1">Class Schedules</h1>
        </div>
        <div class="mobile-view-content" id="mobileSchedulesContent"></div>
        <div class="mobile-tab-bar">
            <button class="mobile-tab-btn" onclick="exportPDFFromMobile('schedules')"><i
                    class="fa-solid fa-file-pdf"></i><span>PDF</span></button>
            <button class="mobile-tab-btn" onclick="exportCSVFromMobile('schedules')"><i
                    class="fa-solid fa-file-csv"></i><span>CSV</span></button>
        </div>
    </div>

    <div class="mobile-fullscreen-view no-print" id="mobileRecordsView">
        <div class="mobile-view-header">
            <button class="mobile-back-btn" onclick="closeMobileFullscreen('mobileRecordsView')"><i
                    class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-xl font-black text-white mb-1">Academic Records</h1>
        </div>
        <div class="mobile-view-content" id="mobileRecordsContent"></div>
        <div class="mobile-tab-bar">
            <button class="mobile-tab-btn" onclick="exportPDFFromMobile('grades')"><i
                    class="fa-solid fa-file-pdf"></i><span>PDF</span></button>
            <button class="mobile-tab-btn" onclick="exportCSVFromMobile('grades')"><i
                    class="fa-solid fa-file-csv"></i><span>CSV</span></button>
        </div>
    </div>

    <div class="mobile-fullscreen-view no-print" id="mobileDetailView">
        <div class="mobile-view-header" id="mobileDetailHeader">
            <button class="mobile-back-btn" onclick="closeMobileDetail()"><i
                    class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-xl font-black text-white mb-1" id="mobileDetailTitle">Subject</h1>
        </div>
        <div class="mobile-view-content" id="mobileDetailContent"></div>
        <div class="mobile-tab-bar">
            <button class="mobile-tab-btn active" id="mobileTabMat" onclick="switchMobileSubTab('materials')"><i
                    class="fa-solid fa-folder-open"></i><span>Materials</span></button>
            <button class="mobile-tab-btn" id="mobileTabAtt" onclick="switchMobileSubTab('attendance')"><i
                    class="fa-solid fa-clipboard-check"></i><span>Attendance</span></button>
        </div>
    </div>

    <aside
        class="desktop-sidebar fixed inset-y-0 left-0 z-[90] w-72 sidebar flex flex-col no-print md:relative shrink-0">
        <div class="h-20 hidden md:flex items-center px-8 border-b border-white/5">
            <div class="flex items-center gap-3">
                <img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png" class="h-8">
                <span class="font-black text-lg tracking-tighter uppercase">CMCS <span
                        class="text-gray-500">VLS</span></span>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 space-y-6 overflow-y-auto">
            <div>
                <p class="px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Core Portal</p>
                <a onclick="switchGlobalView('schedules')" id="navSched"
                    class="sidebar-btn flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold mb-2 cursor-pointer active-nav">
                    <i class="fa-solid fa-calendar-day"></i> <span class="uppercase">Schedules</span>
                </a>
                <a onclick="switchGlobalView('grades')" id="navGrades"
                    class="sidebar-btn flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold mb-2 cursor-pointer">
                    <i class="fa-solid fa-file-invoice"></i> <span class="uppercase">Records</span>
                </a>
            </div>
            <div>
                <p class="px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Enrolled Subjects
                </p>
                <div id="subjectNavItems" class="space-y-2"></div>
            </div>
        </nav>
        <div class="p-6 border-t border-white/5">
            <button onclick="logout()"
                class="w-full py-3 rounded-xl bg-red-500/10 text-red-500 text-[10px] font-black uppercase">Sign
                Out</button>
        </div>
    </aside>

    <div id="printAreaWrapper" class="flex-1 flex flex-col h-full overflow-hidden">
        <main class="flex-1 flex flex-col h-full overflow-hidden">
            <header id="mainHeader"
                class="py-4 md:py-8 flex flex-col md:flex-row items-center justify-between px-4 md:px-10 border-b border-white/5 no-print gap-4">
                <div>
                    <h1 id="headerTitle" class="text-xs md:text-sm font-black uppercase tracking-[0.2em]">DASHBOARD</h1>
                </div>
                <div class="header-actions flex items-center gap-3">
                    <div id="subjectToggles" class="hidden glass-card p-1 flex">
                        <button id="btnAtt" onclick="switchSubTab('attendance')"
                            class="px-5 py-2.5 text-[10px] font-black uppercase rounded-lg active-nav">Attendance</button>
                        <button id="btnMat" onclick="switchSubTab('materials')"
                            class="px-5 py-2.5 text-[10px] font-black uppercase rounded-lg text-gray-500">Materials</button>
                    </div>
                    <div id="exportGroup" class="flex gap-2">
                        <button onclick="exportCSV()"
                            class="px-5 py-2.5 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase">CSV</button>
                        <button onclick="exportPDF()"
                            class="px-5 py-2.5 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase">PDF</button>
                    </div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-4 md:p-10">
                <div id="workspace" class="max-w-7xl mx-auto space-y-6 md:space-y-10">
                    <div id="printArea">
                        <div id="printHeader" class="hidden flex-col items-center text-center w-full mb-8">
                            <img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png"
                                class="w-16 mb-2">
                            <h2 class="text-xl font-black text-black">Central Mindanao Computer School</h2>
                            <p id="lblReportType"
                                class="mt-4 font-black uppercase tracking-widest text-sm border-t-2 border-black pt-2">
                            </p>
                            <div class="grid grid-cols-2 mt-6 text-left w-full border-b border-black pb-4 text-black">
                                <div>
                                    <p>Student: <span id="pName"></span></p>
                                    <p>ID: <span id="pID"></span></p>
                                </div>
                                <div>
                                    <p>Year/Sem: <span id="pYearSem"></span></p>
                                    <p>Date: <span id="pGenDate"></span></p>
                                </div>
                            </div>
                        </div>
                        <div class="glass-card transparent-table-card overflow-hidden">
                            <div id="scrollContainer" class="table-container">
                                <table id="mainTable">
                                    <thead id="tableHead"
                                        class="bg-white/5 text-[10px] uppercase font-black text-gray-400"></thead>
                                    <tbody id="tableBody" class="divide-y divide-white/5 text-sm"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ", authDomain: "svls-289ee.firebaseapp.com", projectId: "svls-289ee", storageBucket: "svls-289ee.firebasestorage.app", messagingSenderId: "500705386198", appId: "1:500705386198:web:96f189662bc2aa99cf7377" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentStudent = null, programs = [], activeSubj = null, currentMode = 'schedules';
        let isMobileView = window.innerWidth <= 768;

        // Fix: Reload page when switching between mobile and web
        window.addEventListener('resize', () => {
            const nowMobile = window.innerWidth <= 768;
            if (nowMobile !== isMobileView) {
                window.location.reload();
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "students", user.uid));
                if (snap.exists()) {
                    currentStudent = snap.data();
                    updateUI();
                    loadData();
                }
            } else { window.location.href = "login.html"; }
        });

        function updateUI() {
            const initial = currentStudent.firstname[0] + currentStudent.lastname[0];
            document.getElementById('mobileHeaderInitial').innerText = initial;
            document.getElementById('mobileDrawerInitial').innerText = initial;
            document.getElementById('mobileDrawerName').innerText = `${currentStudent.lastname}, ${currentStudent.firstname}`;
            document.getElementById('mobileDrawerId').innerText = currentStudent.studentId;
        }

        async function loadData() {
            const q = query(collection(db, "programs"), where("course", "==", currentStudent.course), where("year", "==", currentStudent.year), where("semester", "==", currentStudent.semester));
            const snap = await getDocs(q);
            programs = snap.docs.map(d => d.data());
            renderSidebar();
            if (isMobileView) renderMobileSubjects();
            else switchGlobalView('schedules');
        }

        // Fix: Fixed desktop subject loading logic
        window.switchGlobalView = (mode, subjCode = null) => {
            currentMode = mode;
            activeSubj = subjCode;

            document.getElementById('navSched').classList.remove('active-nav');
            document.getElementById('navGrades').classList.remove('active-nav');
            document.querySelectorAll('.subj-btn').forEach(b => b.classList.remove('active-nav'));

            if (mode === 'schedules') {
                document.getElementById('navSched').classList.add('active-nav');
                document.getElementById('headerTitle').innerText = "CLASS SCHEDULES";
                document.getElementById('subjectToggles').classList.add('hidden');
                renderSchedules();
            } else if (mode === 'grades') {
                document.getElementById('navGrades').classList.add('active-nav');
                document.getElementById('headerTitle').innerText = "OFFICIAL RECORDS";
                document.getElementById('subjectToggles').classList.add('hidden');
                renderGrades();
            } else if (mode === 'subject') {
                const btn = document.querySelector(`[onclick*="'${subjCode}'"]`);
                if (btn) btn.classList.add('active-nav');
                document.getElementById('headerTitle').innerText = subjCode;
                document.getElementById('subjectToggles').classList.remove('hidden');
                switchSubTab('attendance');
            }
        };

        function renderSidebar() {
            const container = document.getElementById('subjectNavItems');
            container.innerHTML = programs.map(p => `
               <a onclick="switchGlobalView('subject', '${p.code}')" class="subj-btn flex items-center gap-4 px-4 py-3 rounded-xl text-xs font-bold cursor-pointer uppercase">
                   <i class="fa-solid fa-book-open"></i> ${p.name}
               </a>
           `).join('');
        }

        function renderSchedules() {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            head.innerHTML = `<tr><th class="p-5">Subject</th><th>Schedule</th><th>Time</th><th>Room</th></tr>`;
            body.innerHTML = programs.map(p => `
               <tr><td class="p-5 font-bold">${p.name}</td><td>${p.schedule}</td><td>${p.startTime} - ${p.endTime}</td><td>${p.room || 'N/A'}</td></tr>
           `).join('');
        }

        window.exportPDF = async () => {
            const el = document.getElementById('printAreaWrapper');
            document.getElementById('pName').innerText = `${currentStudent.lastname}, ${currentStudent.firstname}`;
            document.getElementById('pID').innerText = currentStudent.studentId;
            document.getElementById('pYearSem').innerText = `YEAR ${currentStudent.year} - ${currentStudent.semester}`;
            document.getElementById('pGenDate').innerText = new Date().toLocaleDateString();
            document.getElementById('lblReportType').innerText = currentMode === 'schedules' ? "CERTIFICATE OF MATRICULATION" : "SCHOLASTIC RECORD";

            // Small delay to ensure styles apply
            setTimeout(() => { window.print(); }, 250);
        };

        window.toggleMobileMenu = () => {
            document.getElementById('mobileDrawer').classList.toggle('active');
            document.getElementById('mobileMenuOverlay').classList.toggle('active');
        };

        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");

        // Mobile View Functions (Stubbed for completeness)
        window.openMobileSchedules = () => { document.getElementById('mobileSchedulesView').classList.add('active'); };
        window.closeMobileFullscreen = (id) => { document.getElementById(id).classList.remove('active'); };
        window.exportPDFFromMobile = (type) => {
            currentMode = type;
            exportPDF();
        };
    </script>
</body>

</html>
