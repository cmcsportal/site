<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | CMCS VLS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Modern Scrollbar Universal */
        ::-webkit-scrollbar { width: 6px; height: 6px; display: block; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; border: 1px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); background-clip: content-box; }

        .logo-watermark {
            position: fixed;
            inset: 0;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.04;
            pointer-events: none;
        }

        .logo-watermark img { height: 75%; filter: grayscale(1) brightness(0.5); }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }

        .sidebar { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-btn, .subj-btn { transition: all 0.3s ease; color: #94a3b8; border: 1px solid transparent; cursor: pointer; }
        .sidebar-btn:hover, .subj-btn:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .active-nav { background: white !important; color: black !important; font-weight: 800; border-radius: 12px !important; }

        /* Subject Card Styling (Mobile) */
        .subject-card {
            position: relative;
            overflow: hidden;
            border-radius: 1.25rem;
            height: 140px;
            transition: transform 0.2s ease;
        }
        .subject-card-bg {
            position: absolute;
            right: -10%;
            bottom: -10%;
            width: 120px;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Full Screen Mobile View */
        #mobileSubjectFullScreen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #050505;
            display: none;
            flex-direction: column;
        }
        #mobileSubjectFullScreen.open { display: flex; }

        /* Print Logic */
        @media print {
            @page { margin: 1cm; size: portrait; }
            html, body { background: white !important; color: black !important; height: auto !important; overflow: visible !important; }
            body > *:not(#printAreaWrapper), .no-print, header, aside, #infoSummary, .mobile-only, #mobileSubjectFullScreen { display: none !important; }
            #printAreaWrapper { display: block !important; position: absolute; top: 0; left: 0; width: 100%; height: auto !important; }
            #printArea { display: block !important; }
            .print-watermark { display: flex !important; position: fixed !important; inset: 0 !important; justify-content: center !important; align-items: center !important; opacity: 0.12 !important; z-index: -10 !important; -webkit-print-color-adjust: exact; }
            .print-watermark img { width: 80%; filter: grayscale(1); }
            .glass-card { border: none !important; background: transparent !important; backdrop-filter: none !important; padding: 0 !important; }
            table { width: 100% !important; border-collapse: collapse !important; border: 1.5pt solid #000 !important; margin-top: 10px; background: transparent !important; -webkit-print-color-adjust: exact; }
            th { border: 1pt solid #000 !important; background-color: #f3f4f6 !important; color: black !important; padding: 8px !important; font-size: 10px !important; font-weight: 800; text-transform: uppercase; }
            td { border: 1pt solid #000 !important; padding: 6px 10px !important; color: black !important; font-size: 10px !important; background: rgba(255, 255, 255, 0.4) !important; }
            #printHeader { display: flex !important; }
        }

        @media (max-width: 768px) {
            .desktop-only { display: none !important; }
            #workspace { padding-bottom: 160px; }
        }
    </style>
</head>

<body class="h-screen flex flex-col md:flex-row overflow-hidden">
    <div class="logo-watermark no-print"><img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png"></div>

    <div class="md:hidden sidebar p-4 flex justify-between items-center z-[70] no-print h-16 shrink-0">
        <div class="flex items-center gap-2">
            <img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png" class="h-6">
            <div class="font-black text-xs tracking-tighter uppercase">CMCS <span class="text-gray-500">VLS</span></div>
        </div>
        <button onclick="toggleMobileMenu()" class="text-white p-2 text-xl"><i class="fa-solid fa-circle-user"></i></button>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-[90] w-72 sidebar transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col no-print md:relative shrink-0">
        <div class="h-20 hidden md:flex items-center px-8 border-b border-white/5">
            <div class="flex items-center gap-3">
                <img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png" class="h-8 brightness-125">
                <span class="font-black text-lg tracking-tighter uppercase">CMCS <span class="text-gray-500">VLS</span></span>
            </div>
        </div>
        <nav class="flex-1 py-8 px-4 space-y-6 overflow-y-auto">
            <div>
                <p class="px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Core Portal</p>
                <a onclick="switchGlobalView('schedules'); closeMobileMenu();" id="navSched" class="sidebar-btn flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold mb-2">
                    <i class="fa-solid fa-calendar-day text-xs"></i> <span class="uppercase">Schedules</span>
                </a>
                <a onclick="switchGlobalView('grades'); closeMobileMenu();" id="navGrades" class="sidebar-btn flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold mb-2">
                    <i class="fa-solid fa-file-invoice text-xs"></i> <span class="uppercase">Records</span>
                </a>
            </div>
            <div class="desktop-only">
                <p class="px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Enrolled Subjects</p>
                <div id="subjectNavItems" class="space-y-2"></div>
            </div>
        </nav>
        <div class="p-6 border-t border-white/5">
            <a href="student_edit.html" class="glass-card p-4 flex items-center gap-3 mb-4 block">
                <div id="adminInitial" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-xs font-bold text-black uppercase">AD</div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold truncate uppercase text-white" id="adminName">Loading...</p>
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest" id="studentIdDisplay">Student</p>
                </div>
            </a>
            <button onclick="logout()" class="w-full py-3 rounded-xl bg-red-500/10 text-red-500 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-red-500 hover:text-white transition-all">Sign Out</button>
        </div>
    </aside>

    <div id="sidebarOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[80] hidden"></div>

    <div id="printAreaWrapper" class="flex-1 flex flex-col h-full overflow-hidden">
        <main class="flex-1 flex flex-col h-full overflow-hidden">
            <header id="mainHeader" class="h-auto py-8 hidden md:flex items-center justify-between px-10 border-b border-white/5 no-print gap-4 shrink-0">
                <div class="flex flex-col">
                    <h1 id="headerTitle" class="text-sm font-black uppercase tracking-[0.2em] text-white leading-none uppercase">Dashboard</h1>
                    <div id="headerContext" class="flex flex-wrap items-center gap-2 mt-3"></div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="subjectToggles" class="hidden glass-card !rounded-xl p-1">
                        <button id="btnAtt" onclick="switchSubTab('attendance')" class="px-5 py-2.5 text-[10px] font-black uppercase rounded-lg active-nav">Attendance</button>
                        <button id="btnMat" onclick="switchSubTab('materials')" class="px-5 py-2.5 text-[10px] font-black uppercase rounded-lg text-gray-500">Materials</button>
                    </div>
                    <div id="exportGroup" class="flex gap-2">
                        <button onclick="exportCSV()" class="px-5 py-2.5 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase hover:bg-white hover:text-black transition-all">CSV</button>
                        <button onclick="exportPDF()" class="px-5 py-2.5 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">PDF</button>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-10">
                <div id="workspace" class="max-w-7xl mx-auto space-y-6 md:space-y-10">
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 no-print" id="infoSummary"></div>
                    
                    <div id="mobileSubjectGrid" class="md:hidden grid grid-cols-1 gap-4"></div>

                    <div id="printArea">
                        <div class="print-watermark hidden"><img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png"></div>
                        <div id="printHeader" class="hidden flex-col items-center text-center w-full mb-8">
                            <img src="https://sklepagatesting.github.io/resources/Images/CMCSlogo.png" class="w-16 mb-2">
                            <h2 class="text-xl font-black text-black uppercase">Central Mindanao Computer School</h2>
                            <p class="text-[9px] text-black uppercase font-bold">2nd Floor Villasor Building, Burgos Street, Mlang, Cotabato</p>
                            <p class="w-full border-t-2 border-black mt-4 pt-2 font-black text-black uppercase tracking-widest text-sm" id="lblReportType"></p>
                            <div class="grid grid-cols-2 gap-x-12 mt-6 text-left w-full border-b border-black pb-4 text-black text-[10pt]">
                                <div class="space-y-1">
                                    <p class="font-bold">Student: <span id="pName" class="font-normal uppercase"></span></p>
                                    <p class="font-bold">ID Number: <span id="pID" class="font-normal"></span></p>
                                    <p class="font-bold">Course: <span id="pCourse" class="font-normal uppercase"></span></p>
                                </div>
                                <div class="space-y-1">
                                    <p class="font-bold">Year/Sem: <span id="pYearSem" class="font-normal uppercase"></span></p>
                                    <p class="font-bold">School Year: <span id="pSY" class="font-normal">2025-2026</span></p>
                                    <p class="font-bold italic">Date Generated: <span id="pGenDate" class="font-normal not-italic"></span></p>
                                </div>
                            </div>
                        </div>

                        <div id="tableCard" class="glass-card overflow-hidden no-print-card">
                            <div class="w-full overflow-x-auto">
                                <table class="w-full text-left border-collapse" id="mainTable">
                                    <thead id="tableHead" class="bg-white/5 text-[10px] uppercase font-black text-gray-400"></thead>
                                    <tbody id="tableBody" class="divide-y divide-white/5 text-sm"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="mobileExportActions" class="md:hidden hidden flex gap-3 pb-10">
                        <button onclick="exportCSV()" class="flex-1 py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase">Download CSV</button>
                        <button onclick="exportPDF()" class="flex-1 py-4 bg-red-500/10 border border-red-500/20 text-red-500 rounded-2xl text-[10px] font-black uppercase">Download PDF</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/90 backdrop-blur-xl border-t border-white/10 flex justify-around items-center h-20 px-4 z-[80] no-print">
        <button onclick="switchGlobalView('subjects')" id="mobNavSubj" class="flex flex-col items-center gap-1 text-white">
            <i class="fa-solid fa-book-open text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Subjects</span>
        </button>
        <button onclick="switchGlobalView('schedules')" id="mobNavSched" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-calendar text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Schedules</span>
        </button>
        <button onclick="switchGlobalView('grades')" id="mobNavGrades" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fa-solid fa-file-invoice text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Records</span>
        </button>
    </div>

    <div id="mobileSubjectFullScreen" class="no-print">
        <div class="h-16 flex items-center px-6 border-b border-white/5 shrink-0">
            <button onclick="closeMobPanel()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="ml-4 flex-1 truncate">
                <h3 id="mobPanelTitle" class="text-sm font-black uppercase truncate">Subject Name</h3>
                <p id="mobPanelTeacher" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest truncate"></p>
            </div>
        </div>
        
        <div class="p-4 flex gap-2">
            <button id="mobTabAtt" onclick="switchMobTab('attendance')" class="flex-1 py-3 rounded-xl bg-white text-black text-[10px] font-black uppercase">Attendance</button>
            <button id="mobTabMat" onclick="switchMobTab('materials')" class="flex-1 py-3 rounded-xl bg-white/5 text-gray-500 text-[10px] font-black uppercase">Materials</button>
        </div>

        <div id="mobPanelContent" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ", authDomain: "svls-289ee.firebaseapp.com", projectId: "svls-289ee", storageBucket: "svls-289ee.firebasestorage.app", messagingSenderId: "500705386198", appId: "1:500705386198:web:96f189662bc2aa99cf7377" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        
        let currentStudent = null, programs = [], activeSubj = null, currentMode = 'subjects';

        const cardColors = [
            { bg: 'bg-rose-500/20', accent: 'text-rose-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135783.png' },
            { bg: 'bg-emerald-500/20', accent: 'text-emerald-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135768.png' },
            { bg: 'bg-blue-500/20', accent: 'text-blue-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png' },
            { bg: 'bg-amber-500/20', accent: 'text-amber-400', icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135755.png' }
        ];

        function t12(t) { if (!t) return ""; let [h, m] = t.split(':'); h = parseInt(h); const p = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${m} ${p}`; }

        onAuthStateChanged(auth, async user => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists() && snap.data().role === 'student') {
                    currentStudent = { uid: user.uid, ...snap.data() };
                    initUI(); await fetchSubjects(); 
                    if(window.innerWidth <= 768) switchGlobalView('subjects'); else switchGlobalView('schedules');
                } else { window.location.href = "login.html"; }
            } else { window.location.href = "login.html"; }
        });

        function initUI() {
            document.getElementById('adminName').innerText = `${currentStudent.lastname}, ${currentStudent.firstname}`;
            document.getElementById('adminInitial').innerText = currentStudent.firstname[0] + currentStudent.lastname[0];
            document.getElementById('studentIdDisplay').innerText = `ID: ${currentStudent.studentId}`;
            document.getElementById('infoSummary').innerHTML = `
                <div class="glass-card p-5 border-white/5"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">PROGRAM</p><p class="text-xs md:text-sm font-black text-white uppercase truncate">${currentStudent.course}</p></div>
                <div class="glass-card p-5 border-white/5"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">YEAR/SEM</p><p class="text-xs md:text-sm font-black text-white uppercase">Y${currentStudent.year} - ${currentStudent.semester}</p></div>
                <div class="glass-card p-5 border-white/5 hidden md:block"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">STATUS</p><p class="text-xs md:text-sm font-black text-emerald-400 uppercase">${currentStudent.status || 'ENROLLED'}</p></div>
                <div class="glass-card p-5 border-white/5 hidden md:block"><p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">SCHOOL YEAR</p><p class="text-xs md:text-sm font-black text-blue-400 uppercase">2025-2026</p></div>`;
        }

        async function fetchSubjects() {
            const codes = currentStudent.assignedPrograms || []; if (!codes.length) return;
            const q = query(collection(db, "programs"), where("code", "in", codes));
            const snap = await getDocs(q); programs = snap.docs.map(d => d.data());
            
            const nav = document.getElementById('subjectNavItems'); 
            const grid = document.getElementById('mobileSubjectGrid');
            nav.innerHTML = ''; grid.innerHTML = '';

            programs.forEach((p, i) => {
                const color = cardColors[i % cardColors.length];
                const a = document.createElement('a'); 
                a.id = `nav-${p.code}`; a.className = "subj-btn flex items-center gap-4 px-4 py-3.5 rounded-2xl text-[11px] font-black uppercase mb-1";
                a.onclick = () => { switchSubjectView(p); };
                a.innerHTML = `<i class="fa-solid fa-book-open text-xs"></i> ${p.code}`; nav.appendChild(a);

                grid.innerHTML += `
                    <div onclick="openMobPanel('${p.code}')" class="subject-card ${color.bg} border border-white/5 p-5 flex flex-col justify-between">
                        <img src="${color.icon}" class="subject-card-bg">
                        <div>
                            <h4 class="text-base font-black uppercase text-white leading-tight">${p.name}</h4>
                            <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${p.code}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex flex-col"><span class="text-[8px] font-bold text-gray-500 uppercase">Schedule</span><span class="text-[10px] font-black text-white uppercase">${p.schedule}</span></div>
                            <div class="flex flex-col"><span class="text-[8px] font-bold text-gray-500 uppercase">Instructor</span><span class="text-[10px] font-black ${color.accent} uppercase">${p.teacher}</span></div>
                        </div>
                    </div>`;
            });
        }

        window.switchGlobalView = (mode) => {
            currentMode = mode; activeSubj = null;
            const isMobile = window.innerWidth <= 768;

            if(isMobile) {
                document.querySelectorAll('.md\\:hidden button').forEach(b => b.classList.replace('text-white', 'text-gray-500'));
                const map = { 'subjects': 'mobNavSubj', 'schedules': 'mobNavSched', 'grades': 'mobNavGrades' };
                if(map[mode]) document.getElementById(map[mode]).classList.replace('text-gray-500', 'text-white');
                document.getElementById('mobileExportActions').classList.toggle('hidden', mode === 'subjects');
            }

            document.getElementById('mobileSubjectGrid').classList.toggle('hidden', mode !== 'subjects');
            document.getElementById('tableCard').classList.toggle('hidden', mode === 'subjects');
            document.getElementById('subjectToggles').classList.add('hidden');
            document.getElementById('headerTitle').innerText = mode === 'schedules' ? "Official Class Schedules" : (mode === 'grades' ? "Scholastic Performance Record" : "Enrolled Subjects");
            document.getElementById('headerContext').innerHTML = '';
            
            if (mode !== 'subjects') renderTable();
        };

        window.switchSubjectView = (p) => {
            activeSubj = p; currentMode = 'attendance';
            document.getElementById('headerTitle').innerText = p.name;
            document.getElementById('headerContext').innerHTML = `
                <span class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase"><i class="fa-solid fa-calendar mr-1"></i> ${p.schedule}</span>
                <span class="bg-white/10 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase"><i class="fa-solid fa-clock mr-1"></i> ${t12(p.startTime)} - ${t12(p.endTime)}</span>
                <span class="bg-emerald-600/20 text-emerald-400 border border-emerald-500/20 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase"><i class="fa-solid fa-user-tie mr-1"></i> ${p.teacher}</span>`;
            document.getElementById('subjectToggles').classList.remove('hidden');
            document.getElementById('tableCard').classList.remove('hidden');
            switchSubTab('attendance');
        };

        window.switchSubTab = (tab) => {
            currentMode = tab;
            document.getElementById('btnAtt').className = tab === 'attendance' ? 'px-5 py-2.5 text-[10px] font-black uppercase rounded-lg active-nav' : 'px-5 py-2.5 text-[10px] font-black uppercase rounded-lg text-gray-500';
            document.getElementById('btnMat').className = tab === 'materials' ? 'px-5 py-2.5 text-[10px] font-black uppercase rounded-lg active-nav' : 'px-5 py-2.5 text-[10px] font-black uppercase rounded-lg text-gray-500';
            renderTable();
        };

        async function renderTable() {
            const head = document.getElementById('tableHead'); const body = document.getElementById('tableBody'); body.innerHTML = '';
            if (currentMode === 'schedules') {
                head.innerHTML = `<tr><th class="px-8 py-5">Code</th><th class="px-8 py-5">Subject</th><th class="px-8 py-5">Schedule</th><th class="px-8 py-5">Instructor</th></tr>`;
                programs.forEach(p => { body.innerHTML += `<tr><td class="px-8 py-6 font-black text-white">${p.code}</td><td class="px-8 py-6 font-bold text-white uppercase">${p.name}</td><td class="px-8 py-6 text-white font-bold">${p.schedule} <br><span class="text-[10px] text-gray-500">${t12(p.startTime)} - ${t12(p.endTime)}</span></td><td class="px-8 py-6 text-gray-400 font-bold uppercase">${p.teacher}</td></tr>`; });
            } else if (currentMode === 'grades') {
                head.innerHTML = `<tr><th class="px-8 py-5">Subject</th><th class="px-8 py-5 text-center">PRE</th><th class="px-8 py-5 text-center">MID</th><th class="px-8 py-5 text-center">FIN</th><th class="px-8 py-5 text-right">POINT</th></tr>`;
                programs.forEach(p => { const g = currentStudent.grades?.[p.code] || { prelim: '-', midterm: '-', final: '-', point: '-' };
                    body.innerHTML += `<tr><td class="px-8 py-6 font-bold text-white uppercase">${p.name}</td><td class="text-center font-black">${g.prelim}</td><td class="text-center font-black">${g.midterm}</td><td class="text-center font-black">${g.final}</td><td class="text-right px-8 font-black text-blue-400">${g.point}</td></tr>`; });
            } else if (currentMode === 'attendance') {
                head.innerHTML = `<tr><th class="px-8 py-5">Date</th><th class="px-8 py-5 text-center">Status</th></tr>`;
                const att = currentStudent.attendance?.[activeSubj.code] || {};
                Object.keys(att).sort().reverse().forEach(d => {
                    const color = att[d] === 'P' ? 'text-emerald-400' : 'text-red-500';
                    body.innerHTML += `<tr><td class="px-8 py-6 font-black text-white">${d}</td><td class="text-center font-black ${color}">${att[d] === 'P' ? 'PRESENT' : 'ABSENT'}</td></tr>`;
                });
            } else if (currentMode === 'materials') {
                head.innerHTML = `<tr><th class="px-8 py-5">Resource Name</th><th class="px-8 py-5 text-right">Action</th></tr>`;
                const q = query(collection(db, "materials"), where("subjectCode", "==", activeSubj.code));
                const snap = await getDocs(q);
                snap.forEach(d => { const m = d.data(); body.innerHTML += `<tr><td class="px-8 py-6 font-bold text-white uppercase">${m.name}</td><td class="px-8 py-6 text-right"><a href="${m.link}" target="_blank" class="bg-white text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">Open</a></td></tr>`; });
            }
        }

        window.openMobPanel = (code) => {
            activeSubj = programs.find(p => p.code === code);
            document.getElementById('mobPanelTitle').innerText = activeSubj.name;
            document.getElementById('mobPanelTeacher').innerText = activeSubj.teacher;
            document.getElementById('mobileSubjectFullScreen').classList.add('open');
            switchMobTab('attendance');
        };

        window.closeMobPanel = () => document.getElementById('mobileSubjectFullScreen').classList.remove('open');

        window.switchMobTab = async (tab) => {
            const content = document.getElementById('mobPanelContent'); content.innerHTML = '<p class="text-center py-10 opacity-30">Loading...</p>';
            document.getElementById('mobTabAtt').className = tab === 'attendance' ? 'flex-1 py-3 rounded-xl bg-white text-black text-[10px] font-black uppercase' : 'flex-1 py-3 rounded-xl bg-white/5 text-gray-500 text-[10px] font-black uppercase';
            document.getElementById('mobTabMat').className = tab === 'materials' ? 'flex-1 py-3 rounded-xl bg-white text-black text-[10px] font-black uppercase' : 'flex-1 py-3 rounded-xl bg-white/5 text-gray-500 text-[10px] font-black uppercase';

            if (tab === 'attendance') {
                const att = currentStudent.attendance?.[activeSubj.code] || {};
                content.innerHTML = Object.keys(att).length ? '' : '<div class="text-center py-20 text-[10px] text-gray-600 font-bold uppercase tracking-widest">No records found</div>';
                Object.keys(att).sort().reverse().forEach(d => {
                    const isP = att[d] === 'P';
                    content.innerHTML += `<div class="p-4 rounded-2xl bg-white/5 flex justify-between items-center"><span class="text-xs font-black text-white">${d}</span><span class="${isP ? 'text-emerald-400 bg-emerald-400/10' : 'text-red-500 bg-red-500/10'} px-3 py-1 rounded-lg text-[9px] font-black">${isP ? 'PRESENT' : 'ABSENT'}</span></div>`;
                });
            } else {
                const q = query(collection(db, "materials"), where("subjectCode", "==", activeSubj.code));
                const snap = await getDocs(q);
                content.innerHTML = snap.empty ? '<div class="text-center py-20 text-[10px] text-gray-600 font-bold uppercase tracking-widest">No materials available</div>' : '';
                snap.forEach(d => {
                    const m = d.data();
                    content.innerHTML += `<div class="p-4 rounded-2xl bg-white/5 flex justify-between items-center"><div class="flex items-center gap-3"><i class="fa-solid fa-file-lines text-blue-500"></i><span class="text-xs font-black text-white uppercase">${m.name}</span></div><a href="${m.link}" target="_blank" class="text-[10px] font-black text-blue-400 uppercase">Open</a></div>`;
                });
            }
        };

        window.exportCSV = () => {
            let csv = "STUDENT NAME," + currentStudent.lastname + " " + currentStudent.firstname + "\nID," + currentStudent.studentId + "\nCOURSE," + currentStudent.course + "\n\n";
            if (currentMode === 'schedules') {
                csv += "CODE,SUBJECT,SCHEDULE,TIME,TEACHER\n"; programs.forEach(p => csv += `${p.code},${p.name},${p.schedule},${p.startTime}-${p.endTime},${p.teacher}\n`);
            } else if (currentMode === 'grades' || currentMode === 'subjects') {
                csv += "SUBJECT,PRELIM,MIDTERM,FINAL,GPA\n"; programs.forEach(p => { const g = currentStudent.grades?.[p.code] || {}; csv += `"${p.name}",${g.prelim || '-'},${g.midterm || '-'},${g.final || '-'},${g.point || '-'}\n`; });
            }
            const blob = new Blob([csv], { type: 'text/csv' }); const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${currentStudent.lastname}_${currentMode}.csv`; a.click();
        };

        window.exportPDF = () => {
            const now = new Date(); document.getElementById('pGenDate').innerText = now.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
            document.getElementById('lblReportType').innerText = currentMode === 'schedules' ? "OFFICIAL CLASS SCHEDULE / CERTIFICATE OF MATRICULATION" : "OFFICIAL STUDENT SCHOLASTIC RECORD";
            document.getElementById('pName').innerText = `${currentStudent.lastname}, ${currentStudent.firstname}`;
            document.getElementById('pID').innerText = currentStudent.studentId; document.getElementById('pCourse').innerText = currentStudent.course;
            document.getElementById('pYearSem').innerText = `YEAR ${currentStudent.year} - ${currentStudent.semester}`;
            document.querySelector('.print-watermark').classList.remove('hidden');
            window.print();
            document.querySelector('.print-watermark').classList.add('hidden');
        };

        window.toggleMobileMenu = () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebarOverlay').classList.toggle('hidden'); };
        window.closeMobileMenu = () => { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sidebarOverlay').classList.add('hidden'); };
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
