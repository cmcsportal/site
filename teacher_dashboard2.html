<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard | CMCS VLS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .sidebar { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .active-nav { background: white !important; color: black !important; }
        .loader { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid white; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media print {
            body { background: white !important; color: black !important; }
            aside, header, .no-print, #materialUploadSection, #controlsArea { display: none !important; }
            #workspace { display: block !important; }
            #printArea, #printArea * { visibility: visible; color: black !important; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            .print-val { display: inline !important; font-weight: bold; }
            table { border-collapse: collapse; width: 100%; border: 1pt solid black; }
            th, td { border: 1pt solid black !important; padding: 8px; }
        }
        .print-val { display: none; }
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    
    <div id="modalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden items-center justify-center p-4">
        <div class="glass-card max-w-sm w-full p-8 text-center border-white/20">
            <div id="modalIcon" class="mb-4 text-2xl"></div>
            <h3 id="modalTitle" class="text-sm font-black text-white uppercase tracking-widest mb-2"></h3>
            <p id="modalBody" class="text-xs text-gray-400 mb-8"></p>
            <div class="flex flex-col gap-3" id="modalButtons"></div>
        </div>
    </div>

    <aside class="w-72 sidebar flex flex-col z-20 no-print">
        <div class="h-20 flex items-center px-8 border-b border-white/5">
            <span class="font-black text-lg tracking-tighter uppercase">CMCS <span class="opacity-40">VLS</span></span>
        </div>
        <nav class="flex-1 py-8 px-4 space-y-2 overflow-y-auto" id="subjectNav"></nav>
        <div class="p-6 border-t border-white/5">
            <div class="glass-card p-4 flex items-center gap-3 mb-4">
                <div id="adminInitial" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-xs font-bold text-black uppercase">--</div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold truncate uppercase text-white" id="adminName">Loading...</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full py-3 rounded-xl bg-red-500/10 text-red-500 text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">Sign Out</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 flex items-center justify-between px-10 border-b border-white/5 z-10 no-print">
            <div class="flex flex-col">
                <h1 id="activeSubjectTitle" class="text-sm font-black uppercase tracking-[0.2em] text-white">Select Subject</h1>
                <p id="subjectSubDetails" class="text-[10px] text-gray-500 font-bold uppercase mt-1"></p>
            </div>
            <div id="viewToggles" class="hidden bg-white/5 p-1 rounded-full flex gap-1 border border-white/10">
                <button id="btnAtt" onclick="switchView('attendance')" class="px-6 py-2 text-[10px] font-black uppercase tracking-widest rounded-full transition-all active-nav">Attendance</button>
                <button id="btnGrd" onclick="switchView('grades')" class="px-6 py-2 text-[10px] font-black uppercase tracking-widest rounded-full transition-all text-gray-500">Grades</button>
                <button id="btnMat" onclick="switchView('materials')" class="px-6 py-2 text-[10px] font-black uppercase tracking-widest rounded-full transition-all text-gray-500">Materials</button>
            </div>
            <button onclick="saveCurrentWork()" id="saveBtn" class="hidden bg-white text-black px-8 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all">Sync Data</button>
        </header>

        <div class="flex-1 overflow-y-auto p-10 space-y-8 scrollbar-hide">
            <div id="placeholder" class="h-full flex flex-col items-center justify-center text-gray-600">
                <i class="fa-solid fa-chalkboard-user text-6xl mb-6 opacity-20"></i>
                <p class="font-black uppercase text-[10px] tracking-[0.4em]">Select a subject from the sidebar</p>
            </div>

            <div id="workspace" class="hidden space-y-8">
                <div id="controlsArea" class="flex justify-between items-center no-print">
                    <div class="flex gap-4 items-center">
                        <div id="datePickerContainer" class="hidden">
                            <input type="date" id="attDate" onchange="renderTable()" class="text-[10px] bg-white/5 rounded-lg px-4 py-2 font-black border border-white/10 uppercase tracking-widest">
                        </div>
                        <div class="relative w-64">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-[10px]"></i>
                            <input type="text" id="masterSearch" oninput="doSearch(this.value)" placeholder="SEARCH STUDENT..." class="w-full pl-10 pr-4 py-2.5 rounded-xl text-[10px] font-bold tracking-widest uppercase">
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportCSV()" class="px-5 py-2.5 bg-white/5 border border-white/10 text-white rounded-full text-[10px] font-black uppercase">CSV</button>
                        <button onclick="exportPDF()" class="px-5 py-2.5 bg-white/5 border border-white/10 text-white rounded-full text-[10px] font-black uppercase">PDF</button>
                    </div>
                </div>

                <div id="materialUploadSection" class="hidden glass-card p-8 no-print">
                    <form id="materialForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="hidden" id="editMatId">
                        <input type="text" id="matName" placeholder="TITLE" class="text-xs rounded-xl p-4" required>
                        <input type="url" id="matLink" placeholder="URL" class="text-xs rounded-xl p-4" required>
                        <input type="datetime-local" id="matSchedule" class="text-xs rounded-xl p-4" required>
                        <textarea id="matDesc" placeholder="DESCRIPTION" class="md:col-span-2 text-xs rounded-xl p-4 h-16"></textarea>
                        <button type="submit" id="matSubmitBtn" class="bg-white text-black rounded-xl text-[10px] font-black uppercase">Upload</button>
                    </form>
                </div>

                <div id="printArea">
                    <div class="glass-card overflow-hidden">
                        <table class="w-full text-left">
                            <thead id="tableHead" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-white/5 bg-white/[0.02]"></thead>
                            <tbody id="tableBody" class="divide-y divide-white/5 text-xs text-white"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc, setDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentTeacherName = "", activeSubj = "", currentView = 'attendance', roster = [], subjContext = null, searchTerm = "";

    // Auth State
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists() && snap.data().role === 'teacher') {
                const userData = snap.data();
                currentTeacherName = `${userData.lastname}, ${userData.firstname}`.toUpperCase();
                document.getElementById('adminName').innerText = currentTeacherName;
                document.getElementById('adminInitial').innerText = (userData.firstname[0] + userData.lastname[0]).toUpperCase();
                loadSubjects();
            } else { window.location.href = "login.html"; }
        } else { window.location.href = "login.html"; }
    });

    async function loadSubjects() {
        const q = query(collection(db, "programs"), where("teacher", "==", currentTeacherName));
        const snap = await getDocs(q);
        const nav = document.getElementById('subjectNav');
        nav.innerHTML = '<p class="px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em] mb-4">Subject Handle</p>';
        snap.forEach(d => {
            const s = d.data();
            const a = document.createElement('a');
            a.className = "flex items-center gap-4 px-4 py-3.5 rounded-2xl text-sm font-semibold cursor-pointer text-gray-400 hover:bg-white/5 transition-all subj-btn";
            a.onclick = () => {
                document.querySelectorAll('.subj-btn').forEach(b => b.classList.remove('active-nav'));
                a.classList.add('active-nav');
                selectSubject(s);
            };
            a.innerHTML = `<i class="fa-solid fa-book-bookmark"></i> <span class="uppercase tracking-tighter">${s.code}</span>`;
            nav.appendChild(a);
        });
    }

    function selectSubject(s) {
        subjContext = s;
        activeSubj = s.code;
        document.getElementById('activeSubjectTitle').innerText = s.name;
        document.getElementById('subjectSubDetails').innerText = `${s.course} ${s.year} | ${s.schedule}`;
        document.getElementById('placeholder').classList.add('hidden');
        document.getElementById('workspace').classList.remove('hidden');
        document.getElementById('viewToggles').classList.remove('hidden');
        document.getElementById('saveBtn').classList.remove('hidden');
        document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
        
        onSnapshot(query(collection(db, "users"), where("assignedPrograms", "array-contains", activeSubj)), snap => {
            roster = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable();
        });
    }

    window.switchView = (v) => {
        currentView = v;
        ['btnAtt', 'btnGrd', 'btnMat'].forEach(id => {
            const btn = document.getElementById(id);
            btn.classList.toggle('active-nav', id.toLowerCase().includes(v.substring(0,3)));
            if(!id.toLowerCase().includes(v.substring(0,3))) btn.classList.add('text-gray-500');
        });
        document.getElementById('datePickerContainer').classList.toggle('hidden', v !== 'attendance');
        document.getElementById('materialUploadSection').classList.toggle('hidden', v !== 'materials');
        document.getElementById('saveBtn').classList.toggle('hidden', v === 'materials');
        renderTable();
    };

    window.doSearch = (val) => {
        searchTerm = val.toLowerCase();
        renderTable();
    };

    function renderTable() {
        const body = document.getElementById('tableBody');
        const head = document.getElementById('tableHead');
        body.innerHTML = '';

        if (currentView === 'materials') {
            head.innerHTML = `<tr><th class="px-8 py-4">Resource</th><th class="px-8 py-4">Link</th><th class="px-8 py-4 text-right">Actions</th></tr>`;
            onSnapshot(query(collection(db, "materials"), where("subjectCode", "==", activeSubj)), snap => {
                body.innerHTML = '';
                snap.forEach(dSnap => {
                    const m = dSnap.data();
                    body.innerHTML += `<tr class="hover:bg-white/[0.02]">
                        <td class="px-8 py-5 font-bold uppercase">${m.name}<div class="text-[9px] opacity-40 lowercase mt-1">${m.schedule}</div></td>
                        <td class="px-8 py-5"><a href="${m.link}" target="_blank" class="text-blue-400 font-bold uppercase tracking-widest">Open</a></td>
                        <td class="px-8 py-5 text-right">
                            <button onclick="deleteMat('${dSnap.id}')" class="text-red-500 text-[10px] uppercase font-black">Delete</button>
                        </td></tr>`;
                });
            });
            return;
        }

        const filtered = roster.filter(s => 
            (s.lastname + " " + s.firstname).toLowerCase().includes(searchTerm) || 
            s.studentId?.toLowerCase().includes(searchTerm)
        ).sort((a,b) => a.lastname.localeCompare(b.lastname));

        if (currentView === 'attendance') {
            const dateVal = document.getElementById('attDate').value;
            head.innerHTML = `<tr><th class="px-8 py-4">ID</th><th class="px-8 py-4">Student</th><th class="px-8 py-4 text-center">Status</th></tr>`;
            filtered.forEach(s => {
                const status = s.attendance?.[activeSubj]?.[dateVal] || "P";
                body.innerHTML += `<tr class="hover:bg-white/[0.02]">
                    <td class="px-8 py-5 font-mono text-gray-500">${s.studentId || '-'}</td>
                    <td class="px-8 py-5 font-bold uppercase">${s.lastname}, ${s.firstname}</td>
                    <td class="px-8 py-5 text-center">
                        <div class="flex justify-center gap-4 no-print">
                            <label><input type="radio" name="att_${s.id}" value="P" ${status==='P'?'checked':''}> P</label>
                            <label><input type="radio" name="att_${s.id}" value="L" ${status==='L'?'checked':''}> L</label>
                            <label><input type="radio" name="att_${s.id}" value="A" ${status==='A'?'checked':''}> A</label>
                        </div>
                        <span class="print-val">${status}</span>
                    </td></tr>`;
            });
        } else if (currentView === 'grades') {
            head.innerHTML = `<tr><th class="px-8 py-4">ID</th><th class="px-8 py-4">Student</th><th class="px-8 py-4 text-center">PRE</th><th class="px-8 py-4 text-center">MID</th><th class="px-8 py-4 text-center">FIN</th><th class="px-8 py-4 text-right">PT</th></tr>`;
            filtered.forEach(s => {
                const g = s.grades?.[activeSubj] || { prelim: '', midterm: '', final: '', point: '5.0' };
                body.innerHTML += `<tr class="hover:bg-white/[0.02]">
                    <td class="px-8 py-5 font-mono text-gray-500">${s.studentId || '-'}</td>
                    <td class="px-8 py-5 font-bold uppercase">${s.lastname}, ${s.firstname}</td>
                    <td class="px-8 py-5 text-center"><input type="number" id="pre_${s.id}" oninput="calcPt('${s.id}')" class="w-12 text-center" value="${g.prelim}"><span class="print-val">${g.prelim}</span></td>
                    <td class="px-8 py-5 text-center"><input type="number" id="mid_${s.id}" oninput="calcPt('${s.id}')" class="w-12 text-center" value="${g.midterm}"><span class="print-val">${g.midterm}</span></td>
                    <td class="px-8 py-5 text-center"><input type="number" id="fin_${s.id}" oninput="calcPt('${s.id}')" class="w-12 text-center" value="${g.final}"><span class="print-val">${g.final}</span></td>
                    <td class="px-8 py-5 text-right font-black" id="pt_${s.id}">${g.point}</td>
                </tr>`;
            });
        }
    }

    window.calcPt = (id) => {
        const p = parseFloat(document.getElementById(`pre_${id}`).value || 0);
        const m = parseFloat(document.getElementById(`mid_${id}`).value || 0);
        const f = parseFloat(document.getElementById(`fin_${id}`).value || 0);
        const avg = (p+m+f)/3;
        let pt = avg >= 75 ? (avg >= 97 ? "1.0" : avg >= 94 ? "1.25" : avg >= 91 ? "1.5" : avg >= 88 ? "1.75" : avg >= 85 ? "2.0" : avg >= 82 ? "2.25" : avg >= 79 ? "2.5" : avg >= 76 ? "2.75" : "3.0") : "5.0";
        document.getElementById(`pt_${id}`).innerText = pt;
    };

    window.saveCurrentWork = async () => {
        const btn = document.getElementById('saveBtn');
        const date = document.getElementById('attDate').value;
        btn.disabled = true; btn.innerHTML = '<span class="loader"></span> SYNCING...';
        try {
            const promises = roster.map(s => {
                const ref = doc(db, "users", s.id);
                let p = {};
                if(currentView === 'attendance') {
                    p[`attendance.${activeSubj}.${date}`] = document.querySelector(`input[name="att_${s.id}"]:checked`).value;
                } else if(currentView === 'grades') {
                    p[`grades.${activeSubj}`] = {
                        prelim: document.getElementById(`pre_${s.id}`).value,
                        midterm: document.getElementById(`mid_${s.id}`).value,
                        final: document.getElementById(`fin_${s.id}`).value,
                        point: document.getElementById(`pt_${s.id}`).innerText
                    };
                }
                return updateDoc(ref, p);
            });
            await Promise.all(promises);
            showAlert("Success", "Cloud records updated.");
        } catch (e) { showAlert("Error", "Sync failed.", "danger"); }
        btn.disabled = false; btn.innerText = 'Sync Data';
    };

    window.showAlert = (title, message, type = 'success') => {
        const overlay = document.getElementById('modalOverlay');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = message;
        document.getElementById('modalButtons').innerHTML = `<button onclick="closeModal()" class="w-full bg-white text-black py-3 rounded-full font-black text-[10px] uppercase">Dismiss</button>`;
        overlay.classList.replace('hidden', 'flex');
    };
    window.closeModal = () => document.getElementById('modalOverlay').classList.replace('flex', 'hidden');

    window.exportCSV = () => { /* Standard CSV Export Logic */ };
    window.exportPDF = () => { window.print(); };
    window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
</script>
</body>
</html>
